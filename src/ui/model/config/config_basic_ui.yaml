panels:
  basic:
    layout: "grid"  # 新增：面板布局类型(grid/horizontal/vertical)
    columns: 2      # 新增：网格列数
    sections:
      - id: system
        label: "System Info"
        position: 0
        #layout: horizontal
        fields:
          - key: system.version
            widget: combo_box
            label: "OS Version"
            #position: 1  # 新增：在网格中的位置
            #layout: "horizontal"
          - key: system.kernel_version
            widget: combo_box
            label: "Kernel Version"
            #group: "right"
          - key: software_info.software_version
            widget: line_edit
            label: "Software Version"
            placeholder: "e.g. V1.2.3"
            #group: "left"
          - key: software_info.driver_version
            widget: line_edit
            label: "Driver Version"
            placeholder: "Driver build"
            #group: "right"

      - id: connect_type
        label: "Control Setting"
        position: 1
        #layout: horizontal , "Android" "Linux"
        fields:
          - key: connect_type.type
            widget: combo_box
            label: "Control Type"
            choices: ["Android"]
          - key: connect_type.mac_address
            widget: line_edit
            label: "MAC Address"
            placeholder: "AA:BB:CC:DD:EE:FF"
          - key: connect_type.Android.device
            widget: combo_box
            label: "Android Device"
            placeholder: "adb device identifier"
          - key: connect_type.Linux.ip
            widget: combo_box
            label: "Linux IP"
            placeholder: "192.168.x.x"
          - key: connect_type.third_party.enabled
            widget: checkbox
            label: "Enable third-party control"
          - key: connect_type.third_party.wait_seconds
            widget: int
            label: "Wait seconds"
            minimum: 1
            maximum: 999999
          - key: serial_port.status
            widget: checkbox
            label: "Enable Serial Port"
          - key: serial_port.port
            widget: combo_box
            label: "Port"
          - key: serial_port.baud
            widget: combo_box
            label: "Baud Rate"
            choices: [ "9600", "19200", "38400", "57600", "115200", "921600" ]

      - id: project
        label: "Project Info"
        position: 2
        #layout: horizontal
        fields:
          - key: project.customer
            widget: combo_box
            label: "Customer"
          - key: project.project_type
            widget: combo_box
            label: "Project Type"
          - key: project.project
            widget: combo_box
            label: "Project"
          - key: project.odm
            widget: combo_box
            label: "ODM"
          - key: project.soc
            widget: line_edit
            label: "SoC"
          - key: project.wifi_module
            widget: line_edit
            label: "Wi-Fi Module"
          - key: project.interface
            widget: line_edit
            label: "Interface"
          - key: dut.hw_phase
            widget: combo_box
            label: "HW Phase"
          - key: project.dut_sn
            widget: line_edit
            label: "DUT SN"

      - id: router
        label: "Router Setting"
        position: 3
        #layout: horizontal
        fields:
          - key: router.name
            widget: combo_box
            label: "Router"
          - key: router.address
            widget: line_edit
            label: "Router IP"
            placeholder: "192.168.x.x"
          - key: lab_enviroment.ap_region
            widget: combo_box
            label: "AP Region"
          - key: router.24g_ssid
            widget: line_edit
            label: "2.4G SSID"
            placeholder: "24G"
          - key: router.5g_ssid
            widget: line_edit
            label: "5G SSID"
            placeholder: "5G"


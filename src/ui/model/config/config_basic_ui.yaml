panels:
  basic:
    layout: "grid"
    columns: 2
    sections:
      - id: connect_type
        label: "Control Setting"
        position: 0
        fields:
          - key: connect_type.type
            widget: combo_box
            label: "Control Type"
            choices: ["Android"]
          - key: connect_type.mac_address
            widget: line_edit
            label: "MAC Address"
            placeholder: "AA:BB:CC:DD:EE:FF"
          - key: connect_type.Android.device
            widget: combo_box
            label: "Android Device"
            placeholder: "adb device identifier"
          - key: connect_type.third_party.enabled
            widget: checkbox
            label: "Enable third-party control"
          - key: connect_type.third_party.wait_seconds
            widget: int
            label: "Wait seconds"
            minimum: 1
            maximum: 999999
          - key: serial_port.status
            widget: checkbox
            label: "Enable Serial Port"
          - key: serial_port.port
            widget: combo_box
            label: "Port"
          - key: serial_port.baud
            widget: combo_box
            label: "Baud Rate"
            choices: ["9600", "19200", "38400", "57600", "115200", "921600"]

      - id: router
        label: "Router Setting"
        position: 1
        fields:
          - key: router.name
            widget: combo_box
            label: "Router"
            choices: ["asusax88u", "asusax88upro", "asusax86u", "xiaomibe7000", "xiaomiax3600"]
          - key: router.address
            widget: line_edit
            label: "Router IP"
            placeholder: "192.168.x.x"
          - key: router.24g_ssid
            widget: line_edit
            label: "2.4G SSID"
            placeholder: "24G"
          - key: router.5g_ssid
            widget: line_edit
            label: "5G SSID"
            placeholder: "5G"
